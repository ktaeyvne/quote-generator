<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Quote Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>✨ Quote Generator</h1>

    <div id="card">
      <p id="quote">Loading...</p>
      <span id="author"></span>
    </div>

    <div class="buttons">
      <button onclick="getQuote()">🔄 New</button>
      <button onclick="copyQuote()">📋 Copy</button>
      <button onclick="tweetQuote()">🐦 Share</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
